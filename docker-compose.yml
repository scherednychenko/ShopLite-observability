# ShopLite — Observability backend: InfluxDB 1.8 + Grafana, fully provisioned.
#
#   docker compose up
#
# Then open http://localhost:3000 (anonymous admin, no login) and point any
# ShopLite load tool at InfluxDB to watch the dashboards fill in LIVE:
#   JMeter    → Backend Listener → http://localhost:8086 db "jmeter"
#   k6        → k6 run --out influxdb=http://localhost:8086/k6
#   custom    → any listener writing the OK/KO schema → db "custom"
#   sitespeed → Graphite line protocol → influxdb:2003 db "sitespeed" (CWV)
services:
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"   # HTTP API (JMeter Backend Listener, k6, custom listeners)
    expose:
      - "2003"        # Graphite line protocol (sitespeed.io UI-perf pushes here)
    environment:
      - INFLUXDB_HTTP_AUTH_ENABLED=false
      - INFLUXDB_REPORTING_DISABLED=true
    volumes:
      - influxdb-data:/var/lib/influxdb
      - ./influxdb/init.iql:/docker-entrypoint-initdb.d/init.iql:ro
      - ./influxdb/influxdb.conf:/etc/influxdb/influxdb.conf:ro
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb-data:
  grafana-data:
